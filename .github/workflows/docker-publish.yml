name: Build & Push Docker image to GHCR

on:
  push:
    branches: [ "main" ]
    tags:     [ "v*.*.*" ]
  # Cho phép chạy thủ công từ GitHub UI
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      # 1. Checkout code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Đăng nhập vào GitHub Container Registry
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 3. Tạo metadata (tags & labels)
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # Tag "latest" khi push lên main
            type=raw,value=latest,enable={{is_default_branch}}
            # Tag theo tên branch
            type=ref,event=branch
            # Tag theo version (vX.Y.Z) → image tag X.Y.Z
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            # Tag ngắn commit SHA
            type=sha,prefix=sha-,format=short

      # 4. Setup Docker Buildx (hỗ trợ multi-platform)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 5. Build và push image
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
