name: Build Windows EXE

on:
  # Chạy thủ công từ GitHub UI → Actions → "Run workflow"
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (VD: v2.1.0)'
        required: false
        default: 'latest'

  # Hoặc tự động khi tạo tag version
  push:
    tags:
      - 'v*.*.*'

jobs:
  build-windows-exe:
    runs-on: windows-latest
    permissions:
      contents: write   # Cần để tạo Release

    steps:
      # 1. Checkout code
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Setup Python 3.12
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      # 3. Cài dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      # 4. Build GUI EXE
      - name: Build CheckFormKLTN GUI EXE
        run: |
          pyinstaller CheckFormKLTN_GUI.spec --clean --noconfirm
          echo "Build done. Files in dist/:"
          dir dist

      # 5. Kiểm tra file đầu ra
      - name: Verify EXE exists
        run: |
          if (Test-Path "dist/CheckFormKLTN.exe") {
            $size = (Get-Item "dist/CheckFormKLTN.exe").Length / 1MB
            Write-Host "✅ CheckFormKLTN.exe built successfully ($([math]::Round($size, 1)) MB)"
          } else {
            Write-Error "❌ EXE not found!"
            exit 1
          }
        shell: pwsh

      # 6. Upload artifact (download từ Actions tab)
      - name: Upload EXE as artifact
        uses: actions/upload-artifact@v4
        with:
          name: CheckFormKLTN-Windows-EXE
          path: dist/CheckFormKLTN.exe
          retention-days: 30

      # 7. Tạo GitHub Release (chỉ khi push tag hoặc workflow_dispatch có version)
      - name: Get version string
        id: version
        run: |
          if ("${{ github.ref_type }}" -eq "tag") {
            echo "tag=${{ github.ref_name }}" >> $env:GITHUB_OUTPUT
          } else {
            $date = Get-Date -Format "yyyy.MM.dd"
            echo "tag=build-$date" >> $env:GITHUB_OUTPUT
          }
        shell: pwsh

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "CheckForm KLTN ${{ steps.version.outputs.tag }}"
          body: |
            ## 📥 CheckForm KLTN — Windows Desktop App

            ### Cách dùng
            1. Tải file `CheckFormKLTN.exe` bên dưới
            2. Double-click để chạy (không cần cài Python)
            3. Chọn file / thư mục .docx để kiểm tra
            4. Xuất kết quả ra Excel

            ### Yêu cầu
            - Windows 10 / 11 (64-bit)
            - Không cần cài đặt thêm gì

            > **Lưu ý:** Lần đầu chạy, Windows SmartScreen có thể hỏi xác nhận — chọn "Run anyway".
          files: dist/CheckFormKLTN.exe
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
