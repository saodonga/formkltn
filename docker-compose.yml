# Docker Compose — chạy CheckForm KLTN từ GHCR image
# Dùng: docker compose up -d

services:
  checkform-kltn:
    image: ghcr.io/saodonga/formkltn:latest
    container_name: checkform-kltn
    restart: unless-stopped
    ports:
      - "8080:8080"    # Đổi port trái nếu cần (VD: "80:8080")
    volumes:
      # Mount config GVHD để persist qua các lần restart
      - ./config_kltn.json:/app/config_kltn.json
    environment:
      - FLASK_ENV=production
      - PORT=8080
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
